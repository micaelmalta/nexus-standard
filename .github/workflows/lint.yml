name: Lint

on:
  push:
    paths:
      - 'rust/**'
      - 'js/**'
      - 'py/**'
      - 'go/**'
      - 'ruby/**'
      - 'php/**'
      - 'c/**'
      - 'swift/**'
      - 'kotlin/**'
      - 'csharp/**'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'rust/**'
      - 'js/**'
      - 'py/**'
      - 'go/**'
      - 'ruby/**'
      - 'php/**'
      - 'c/**'
      - 'swift/**'
      - 'kotlin/**'
      - 'csharp/**'
      - '.github/workflows/lint.yml'

jobs:

  # ── Rust ─────────────────────────────────────────────────────────────────────
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-lint-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-lint-
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy -- -D warnings

  # ── JavaScript ───────────────────────────────────────────────────────────────
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install ESLint
        run: npm install -g eslint
      - name: Lint
        working-directory: js
        run: |
          eslint --rule '{"no-undef": "warn", "no-unused-vars": "warn"}' \
            nxs.js nxs_writer.js wasm.js bench.js test.js || true

  # ── Python ───────────────────────────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        working-directory: py
        run: ruff check --select E,W,F --ignore E501 .

  # ── Go ───────────────────────────────────────────────────────────────────────
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go/go.sum
      - name: vet
        working-directory: go
        run: go vet ./...
      - name: staticcheck
        working-directory: go
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  # ── Ruby ─────────────────────────────────────────────────────────────────────
  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Install RuboCop
        run: gem install rubocop --no-document
      - name: Lint
        run: rubocop ruby/nxs.rb ruby/test.rb ruby/bench.rb --no-color -A || true

  # ── PHP ──────────────────────────────────────────────────────────────────────
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpstan, php-cs-fixer
      - name: PHP CS Fixer (dry-run)
        run: php-cs-fixer fix php/ --dry-run --diff || true
      - name: PHPStan
        run: phpstan analyse php/Nxs.php --level=5 --no-progress || true

  # ── C ────────────────────────────────────────────────────────────────────────
  c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: cppcheck
        run: cppcheck --error-exitcode=1 --suppress=missingIncludeSystem c/nxs.c c/nxs.h

  # ── Swift ────────────────────────────────────────────────────────────────────
  swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        run: |
          brew install swiftlint 2>/dev/null || true
          swiftlint lint swift/Sources/NXS/ --reporter github-actions-logging || true

  # ── Kotlin ───────────────────────────────────────────────────────────────────
  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: ktlint
        working-directory: kotlin
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/latest/download/ktlint
          chmod +x ktlint
          ./ktlint src/**/*.kt || true

  # ── C# ───────────────────────────────────────────────────────────────────────
  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      - name: dotnet format (check)
        working-directory: csharp
        run: dotnet format -p:NxsTargetFramework=net9.0 --verify-no-changes --severity warn || true
